# Python Code Reviewer

You are a Python specialist focused on code quality and best practices.

## Your Expertise

- Python 3.10+ features (dataclasses, type hints, match statements)
- PEP 8 style compliance
- Error handling patterns (try/except, custom exceptions)
- File I/O and JSON handling best practices

## Code Standards

When reviewing, always check for:
- Missing type hints on function signatures
- Bare except clauses (should catch specific exceptions)
- Mutable default arguments
- Proper use of context managers (with statements)
- Input validation completeness

## When Reviewing Code

Prioritize:
- [CRITICAL] Security issues and data corruption risks
- [HIGH] Missing error handling
- [MEDIUM] Style and type hint issues
- [LOW] Minor improvements

an class="fd-name">python-standards.instructions.md</span><button class="fd-close" type="button" data-close aria-label="Close">&times;</button></div><pre class="fd-body"><code>---
applyTo: &quot;**/*.py&quot;
---

# Python Standards

These rules apply automatically whenever Copilot works on a Python file in
this project. They never load for other file types, so a conversation about a
Dockerfile or some JSON stays clutter-free.

## Style

- Follow PEP 8 style conventions.
- Add type hints to every function signature.
- Prefer f-strings over `%` formatting or `str.format()`.

## Error Handling

- Catch specific exceptions; never use a bare `except:`.
- Validate inputs at function boundaries and fail with a clear message.

## Testing

- Put pytest tests in `samples/book-app-project/tests/` using `test_*.py` naming.
- Cover the happy path and edge cases (empty input, missing data).

Beginner-friendly course teaching GitHub Copilot CLI. Educational content, not software.

## Structure

| Path | Purpose |
|------|---------|
| `00-07/` | Chapters: analogy → concepts → hands-on → assignment → next |
| `samples/book-app-project/` | **Primary sample**: Python CLI book collection app used throughout all chapters |
| `samples/book-app-project-cs/` | C# version of the book collection app |
| `samples/book-app-project-js/` | JavaScript version of the book collection app |
| `samples/book-app-buggy/` | **Intentional bugs** for debugging exercises (Ch 03) |
| `samples/agents/` | Agent template examples (python-reviewer, pytest-helper, hello-world) |
| `samples/skills/` | Skill template examples (code-checklist, pytest-gen, commit-message, hello-world) |
| `samples/mcp-configs/` | MCP server configuration examples |
| `samples/buggy-code/` | **Optional extra**: Security-focused buggy code (JS and Python) |
| `samples/src/` | **Optional extra**: Legacy JS/React samples from earlier course version |
| `appendices/` | Supplementary reference material |

## Do

- Keep explanations beginner-friendly; explain AI/ML jargon when used
- Ensure bash examples are copy-paste ready
- Tone: friendly, encouraging, practical
- Use `samples/book-app-project/` paths in all primary examples
- Use Python/pytest context for code examples

## Don&#x27;t

- Fix bugs in `samples/book-app-buggy/` or `samples/buggy-code/` — they&#x27;re intentional
- Add chapters without updating README.md course table
- Assume readers know AI/ML terminology

## Build

```bash
npm install &amp;&amp; npm run release
```

  function copyText(text,el){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){flash(el);},
                                               function(){legacyCopy(text);flash(el);});
    } else { legacyCopy(text);flash(el); }
  }
  [].forEach.call(document.querySelectorAll('.term-copy'),function(el){
    // real <button>: native Enter/Space activation, so only wire click
    el.addEventListener('click',function(){copyText(el.getAttribute('data-copy')||'',el);});
  });

  // --- "view file" buttons open a native <dialog> showing the embedded file ---
  [].forEach.call(document.querySelectorAll('.file-view-btn'),function(btn){
    btn.addEventListener('click',function(){
      var dlg=document.getElementById(btn.getAttribute('data-dialog'));
      if(dlg&&typeof dlg.showModal==='function'){ dlg.showModal(); }
      else if(dlg){ dlg.setAttribute('open',''); }
    });
  });
  [].forEach.call(document.querySelectorAll('dialog.file-dialog'),function(dlg){
    var close=dlg.querySelector('[data-close]');
    if(close) close.addEventListener('click',function(){dlg.close();});
    // click on the backdrop (outside the dialog content) closes it
    dlg.addEventListener('click',function(e){ if(e.target===dlg) dlg.close(); });
  });

  if(reduce) return;                 // honor reduced motion: skip the typewriter

  // --- terminal typewriter: types each command line, then a blinking cursor ---
  var CURSOR='\u258b';
  function typeTerminal(fig){
    if(fig.getAttribute('data-typed')) return; fig.setAttribute('data-typed','1');
    var lines=[].slice.call(fig.querySelectorAll('.term-line'));
    if(!lines.length) return;
    lines.forEach(function(el){ el.setAttribute('data-rich',el.innerHTML); el.textContent=''; });
    var i=0;
    (function nextLine(){
      if(i>=lines.length) return;
      var el=lines[i], full=el.getAttribute('data-full')||'', n=0;
      (function step(){
        n++; el.textContent=full.slice(0,n)+CURSOR;
        if(n<full.length){ setTimeout(step,24); return; }
        el.innerHTML=el.getAttribute('data-rich');      // restore dimmed comments
        i++;
        if(i<lines.length) setTimeout(nextLine,220);     // stop cleanly: no resting cursor
      })();
    })();
  }

  // --- start the terminal typewriter when a panel scrolls into view ---
  var cells=[].slice.call(document.querySelectorAll('main.strip .cell'));
  function onVisible(fig){
    if(fig.querySelector('.term-line')) setTimeout(function(){typeTerminal(fig);},340);
  }
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if(!en.isIntersecting) return;
        onVisible(en.target); io.unobserve(en.target);
      });
    },{threshold:0.25, rootMargin:'0px 0px -8% 0px'});
    cells.forEach(function(c){io.observe(c);});
  } else {
    cells.forEach(onVisible);
  }
})();
</script>
</body>
</html>
