    link: false
    alt: Professor Quill and Pip stand beside a chalkboard showing a checklist of four green checkmarks.
    caption: Learning Objectives
    details:
    - "In this chapter you will:"
    - "- Try a quick code review"
    - "- Learn the three interaction modes"
    - "- Use key slash commands"
    - "- Approve the actions Copilot takes"
