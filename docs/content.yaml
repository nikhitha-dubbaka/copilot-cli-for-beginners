# yaml-language-server: $schema=content.schema.json
# Editable content for the Pip comic site.
# Edit the words here, then rebuild with build_site.py.
# The skill owns the rendering engine; this file owns the content.
# Per bubble: lines (the speech text), w (bubble width px),
# tx/ty (the speaker's head x/y - the tail points there).
# Course deep links: site.source_base_url + each chapter's `doc` give every frame
# a book icon linking to that chapter's README. Add a panel `link` (e.g. '#anchor')
# to deep-link a single frame to a specific section.

# Site-wide text and assets (everything not tied to a specific chapter/panel).
# All user-facing words live here; the engine (build_site.py) hard-codes none.
site:
  source_base_url: https://github.com/github/copilot-cli-for-beginners/blob/main  # base of the course repo for frame deep links
  lang: en
  title: GitHub Copilot - Visual Quickstart             # browser tab title (home page)
  chapter_title_suffix: ' - Pip''s Copilot CLI Comic'   # appended to each chapter's tab title
  favicon: assets/img/pip-hero.png
  avatar: assets/img/pip-avatar-hat.png
  avatar_alt: Pip the fox mascot
  select_label: Select a Chapter                        # home page chapter-picker button
  open_section_label: Read this section in the full course  # book-icon link (aria + tooltip)
  read_in_course_label: Read in course                  # visible text on the caption deep-link pill
  copy_command_label: Copy command                      # prefix for terminal copy-button aria-labels
  progress_label: 'Course progress: chapter {n} of {total}'  # banner progress bar (aria); {n}/{total} are filled in
  skip_label: Skip to main content                      # visually-hidden skip-to-content link
  new_tab_label: ' (opens in a new tab)'                # appended to book-icon aria-label (new-tab warning)
  copied_label: Copied!                                 # screen-reader announcement after a command is copied
  nav:
    home: Home
    prev: Previous Chapter
    prev_short: Prev
    next: Next Chapter
    next_short: Next
    aria: Chapter                                        # accessible name for the top nav landmark
    aria_bottom: Chapter (bottom)                        # accessible name for the repeated bottom nav landmark

home:
  title_html: GitHub Copilot CLI<br>for Beginners
  subtitle: A visual quickstart reference for learning agentic coding.
  cta_text: Get Started!
  cta_href: chapter-00.html
  intro:
    img: ch00-welcome.png
    alt: Pip the fox waves hello beside Professor Quill the owl at a cozy desk with a laptop.
    caption: Learn with Pip and Professor Quill - pick a chapter below to get started!
    bubbles:
    - lines:
      - Hi, I'm Pip! Ready to learn
      - about GitHub Copilot CLI?
      w: 624
      tx: 540
      ty: 250
      delay: 600
    - lines:
      - Greetings! I'm Professor Quill. 
      - I explain the "why" behind each step.
      w: 690
      tx: 1140
      ty: 560
      delay: 1600
footer_html: <a href="https://github.com/github/copilot-cli-for-beginners">GitHub
  Copilot CLI for Beginners course</a>
chapters:
- badge: Chapter 00
  doc: 00-quick-start/README.md
  title: Quick Start
  subtitle: Install GitHub Copilot CLI, sign in, clone the samples, and verify it works.
  selector: Quick Start · install, sign in, clone, verify
  panels:
  - img: objectives.png
    link: false
    alt: Professor Quill and Pip stand beside a chalkboard showing a checklist of four green checkmarks.
    caption: Learning Objectives
    details:
    - "In this chapter you will:"
    - "- Install Copilot CLI"
    - "- Sign in to your GitHub account"
    - "- Clone the course samples and run the book app"
  - img: ch00-install.png
    link: '#local-installation'
    alt: Pip gives a thumbs up as software installs onto a laptop.
    caption: Install the CLI
    bubble:
      lines:
      - Got Node.js or Homebrew? One
      - command and you're up and running!
      w: 720
      tx: 645
      ty: 130
    terminal:
    - npm install -g @github/copilot
    - '# Or use Homebrew'
    - 'brew install copilot-cli      # macOS / Linux alternative'
  - img: ch00-login.png
    link: '#authentication'
    alt: Pip holds a key beside Professor Quill, who shows a phone with a security shield.
    caption: Sign in securely
    bubbles:
    - lines:
      - Run copilot, 
      - then type /login to sign in.
      auto: false
      x: 650
      y: 275
      w: 680
      tx: 520
      ty: 260
    - lines:
      - 'Lines after > are typed inside'
      - 'Copilot, not your shell.'
      w: 640
      tx: 650
      ty: 550
    terminal:
    - copilot
    - '> /login'
    - '# Requires an active GitHub Copilot subscription'
  - img: ch00-clone.png
    alt: Pip copies a folder of project files onto a laptop from a cloud.
    caption: Clone the sample project
    bubble:
      lines:
      - Grab the course samples so you
      - have samples to work with!
      w: 680
      tx: 660
      ty: 300
    terminal:
    - git clone https://github.com/github/copilot-cli-for-beginners
    - cd copilot-cli-for-beginners
  - img: ch00-verify.png
    link: '#verify-it-works'
    alt: Pip points at a laptop showing books and a green check.
    caption: Verify it works
    bubble:
      lines:
      - Run the sample book app (you'll need Python installed).
      - See 5 books? You're good to go!
      w: 900
      tx: 430
      ty: 180
    terminal:
    - cd samples/book-app-project
    - python book_app.py list
  - img: ch00-ready.png
    link: false
    alt: Pip cheers beside Professor Quill, who gives a thumbs up next to a trophy.
    caption: You're ready!
    bubbles:
    - lines:
      - Setup complete! The real
      - fun starts in Chapter 01.
      w: 560
      tx: 500
      ty: 185
    - lines:
      - Well done. You
      - earned this trophy!
      w: 470
      tx: 960
      ty: 500
- badge: Chapter 01
