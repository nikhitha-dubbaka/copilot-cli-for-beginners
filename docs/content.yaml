    link: '#getting-comfortable-your-first-prompts'
    alt: Pip looks amazed beside Professor Quill as magic sparkles rise from a laptop.
    caption: Chapter 01 - The magic begins
    bubbles:
    - lines:
      - Just ask copilot to help you in plain English.
      - Watch what happens!
      w: 800
      tx: 540
      ty: 240
    - lines:
      - No secret syntax to learn.
      - Say it your way!
      w: 550
      tx: 1160
      ty: 500
    terminal:
    - copilot
    - '> Explain what a dataclass is in Python in simple terms'
    - '> Write a function that counts books by genre   # it writes the code, too'
  - img: ch01-review.png
    link: '#demo-1-code-review-in-seconds'
    alt: Pip inspects code bugs on a laptop with a magnifying glass.
    caption: Demo - Code review in seconds
    bubble:
      lines:
      - Point me at a file and I'll
      - spot bugs and quality issues!
      w: 560
      tx: 700
      ty: 330
    terminal:
    - '> Review @samples/book-app-project/book_app.py for code quality'
    - '# You''ll learn more about @ and other ways to do reviews later!'
  - img: ch01-permissions.png
    link: '#permissions'
    alt: Pip pauses with a raised paw at a laptop showing a glowing security shield with a checkmark while Professor Quill gestures reassuringly.
    caption: Copilot asks before it acts
    bubbles:
    - lines:
      - Before I run a command or edit
      - a file, I pause and ask you.
      w: 620
      tx: 640
      ty: 320
    - lines:
      - Approve once, or allow all
      - in projects you trust.
      w: 520
      tx: 1180
      ty: 600
    terminal:
    - '> Run the tests for the book app'
    - '? Allow Copilot to run python -m pytest? (y/n)'
    - '# /allow-all on   # auto-approve in trusted projects (use with care!)'
  - img: ch01-modes.png
    link: '#the-three-modes'
    alt: Professor Quill points at three icons - a map, a waiter, and a drive-through - while Pip thinks.
    caption: 'Three modes: plan, interactive, or programmatic'
    bubbles:
    - lines:
      - Plan = a GPS route.
      - Interactive = a waiter chat.
      - Programmatic = a drive-through.
      auto: false
      x: 500
      y: 450
      w: 600
      tx: 470
      ty: 610
    - lines:
      - I'll pick the one
      - that fits the job.
      w: 400
      tx: 1250
      ty: 195
    terminal:
    - 'copilot --plan       # Plan out work first (GPS).'
    - 'copilot              # Interactively prompt and iterate (waiter).'
    - 'copilot -p "[prompt]"  # Programmatic - one-shot answer (drive-through)'
  - img: ch01-interactive.png
    link: '#mode-1-interactive-mode-start-here'
    alt: Pip chats back and forth at a cafe table with Professor Quill acting as a waiter taking notes.
    caption: 'Interactive: chat and iterate'
    bubble:
      lines:
      - I remember your chat, so each
      - prompt builds on the last.
      w: 640
      tx: 560
      ty: 230
    terminal:
    - copilot
    - '> Add type hints to this file'
    - '...response...'
    - '> Now make the error handling robust'
  - img: ch01-plan.png
    link: '#mode-2-plan-mode'
    alt: Pip studies a GPS-style map with a numbered route on a laptop before starting.
    caption: 'Plan: map it out first'
    bubble:
      lines:
      - I create a plan with steps.
      - Once the plan is in place, I can use it
      - to guide my coding.
      w: 700
      tx: 480
      ty: 230
    terminal:
    - copilot
    - '> /plan Add a "mark as read" command and tests to validate it'
  - img: ch01-programmatic.png
    link: '#mode-3-programmatic-mode'
    alt: Pip sits in his car at a drive-through, reaching out the window to grab a takeout bag - one order in, one out.
    caption: 'Programmatic: one-shot answers'
    bubble:
      lines:
      - 'Like a drive-through: one order in,'
      - one answer out. Great for scripts.
      w: 900
      tx: 560
      ty: 230
    terminal:
    - 'copilot -p "How do I read a JSON file in Python?"  # One-shot answer'
  - img: ch01-commands.png
    link: '#essential-slash-commands'
    alt: Pip operates a colorful control panel of buttons.
    caption: Control your session
    bubble:
      lines:
      - Forgot a command? 
      - Type /help.
      - Switching topics? 
      - Use /clear.
      - All done? 
      - Type /exit!
      w: 400
      tx: 800
      ty: 320
    terminal:
    - '/help     # show all commands'
    - '/clear    # start a fresh conversation'
    - '/model    # show or switch the AI model'
    - '/exit     # end the session'
    - '!git status  # ! runs a shell command directly, no AI'
  - img: ch01-next.png
    link: false
    alt: Pip waves goodbye beside Professor Quill while walking toward a glowing arrow.
    caption: On to Chapter 02!
    bubbles:
    - lines:
      - 'Next: give me context'
      - with the @ symbol.
      - See you in Chapter 02!
      w: 500
      tx: 600
      ty: 250
    - lines:
      - Keep going -
      - you're doing great!
      w: 440
      tx: 950
      ty: 490
