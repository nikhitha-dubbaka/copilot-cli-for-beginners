ll="#ffffff"/><line x1="762" y1="164" x2="822" y2="164" stroke="#ffffff" stroke-width="9"/><line x1="762" y1="164" x2="733" y2="183" stroke="#1f2937" stroke-width="6" stroke-linecap="round"/><line x1="822" y1="164" x2="733" y2="183" stroke="#1f2937" stroke-width="6" stroke-linecap="round"/><text x="1006" y="78" text-anchor="middle" font-family="Poppins,Verdana,sans-serif" font-size="34" fill="#1f2937">Point me at a file and I</text><text x="1006" y="124" text-anchor="middle" font-family="Poppins,Verdana,sans-serif" font-size="34" fill="#1f2937">flag bugs and quality issues.</text></g><rect x="8" y="8" width="1520" height="1008" rx="14" fill="none" stroke="#1f2937" stroke-width="14"/></svg><button class="file-view-btn" type="button" data-dialog="fd-ch03-review" aria-haspopup="dialog" aria-label="See the code" style="top:90.332%"><svg class="fv-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M8 9h2"/></svg><span>See the code</span></button></div><dialog class="file-dialog" id="fd-ch03-review" aria-label="book_app.py"><div class="fd-head"><svg class="fv-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M8 9h2"/></svg><span class="fd-name">book_app.py</span><button class="fd-close" type="button" data-close aria-label="Close">&times;</button></div><pre class="fd-body"><code>import sys
from books import BookCollection


# Global collection instance
collection = BookCollection()


def show_books(books):
    &quot;&quot;&quot;Display books in a user-friendly format.&quot;&quot;&quot;
    if not books:
        print(&quot;No books found.&quot;)
        return

    print(&quot;\nYour Book Collection:\n&quot;)

    for index, book in enumerate(books, start=1):
        status = &quot;✓&quot; if book.read else &quot; &quot;
        print(f&quot;{index}. [{status}] {book.title} by {book.author} ({book.year})&quot;)

    print()


def handle_list():
    books = collection.list_books()
    show_books(books)


def handle_add():
    print(&quot;\nAdd a New Book\n&quot;)

    title = input(&quot;Title: &quot;).strip()
    author = input(&quot;Author: &quot;).strip()
    year_str = input(&quot;Year: &quot;).strip()

    try:
        year = int(year_str) if year_str else 0
        collection.add_book(title, author, year)
        print(&quot;\nBook added successfully.\n&quot;)
    except ValueError as e:
        print(f&quot;\nError: {e}\n&quot;)


def handle_remove():
    print(&quot;\nRemove a Book\n&quot;)

    title = input(&quot;Enter the title of the book to remove: &quot;).strip()
    collection.remove_book(title)

    print(&quot;\nBook removed if it existed.\n&quot;)


def handle_find():
    print(&quot;\nFind Books by Author\n&quot;)

    author = input(&quot;Author name: &quot;).strip()
    books = collection.find_by_author(author)

    show_books(books)


def show_help():
    print(&quot;&quot;&quot;
Book Collection Helper

Commands:
  list     - Show all books
  add      - Add a new book
  remove   - Remove a book by title
  find     - Find books by author
  help     - Show this help message
&quot;&quot;&quot;)


def main():
    if len(sys.argv) &lt; 2:
        show_help()
        return

    command = sys.argv[1].lower()

    if command == &quot;list&quot;:
        handle_list()
    elif command == &quot;add&quot;:
        handle_add()
    elif command == &quot;remove&quot;:
        handle_remove()
    elif command == &quot;find&quot;:
        handle_find()
    elif command == &quot;help&quot;:
        show_help()
    else:
        print(&quot;Unknown command.\n&quot;)
        show_help()


if __name__ == &quot;__main__&quot;:
    main()
</code></pre></dialog></figure>

<div id="copy-status" class="sr-only" role="status" aria-live="polite"></div>
<script>
(function(){
  var mq=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)');
  var reduce=mq&&mq.matches;

  // --- per-line copy buttons drawn inside the terminal SVG ---
  function flash(el){
    el.classList.add('copied');
    var s=document.getElementById('copy-status');
    if(s){ s.textContent=''; s.textContent='Copied!'; }
    setTimeout(function(){el.classList.remove('copied');},1300);
  }
  function legacyCopy(text){
    var ta=document.createElement('textarea'); ta.value=text;
    ta.setAttribute('readonly',''); ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);
  }
  function copyText(text,el){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){flash(el);},
                                               function(){legacyCopy(text);flash(el);});
    } else { legacyCopy(text);flash(el); }
  }
  [].forEach.call(document.querySelectorAll('.term-copy'),function(el){
    // real <button>: native Enter/Space activation, so only wire click
    el.addEventListener('click',function(){copyText(el.getAttribute('data-copy')||'',el);});
  });

  // --- "view file" buttons open a native <dialog> showing the embedded file ---
  [].forEach.call(document.querySelectorAll('.file-view-btn'),function(btn){
    btn.addEventListener('click',function(){
      var dlg=document.getElementById(btn.getAttribute('data-dialog'));
      if(dlg&&typeof dlg.showModal==='function'){ dlg.showModal(); }
      else if(dlg){ dlg.setAttribute('open',''); }
    });
  });
  [].forEach.call(document.querySelectorAll('dialog.file-dialog'),function(dlg){
    var close=dlg.querySelector('[data-close]');
    if(close) close.addEventListener('click',function(){dlg.close();});
    // click on the backdrop (outside the dialog content) closes it
    dlg.addEventListener('click',function(e){ if(e.target===dlg) dlg.close(); });
  });

  if(reduce) return;                 // honor reduced motion: skip the typewriter

  // --- terminal typewriter: types each command line, then a blinking cursor ---
  var CURSOR='\u258b';
  function typeTerminal(fig){
    if(fig.getAttribute('data-typed')) return; fig.setAttribute('data-typed','1');
    var lines=[].slice.call(fig.querySelectorAll('.term-line'));
    if(!lines.length) return;
    lines.forEach(function(el){ el.setAttribute('data-rich',el.innerHTML); el.textContent=''; });
    var i=0;
    (function nextLine(){
      if(i>=lines.length) return;
      var el=lines[i], full=el.getAttribute('data-full')||'', n=0;
      (function step(){
        n++; el.textContent=full.slice(0,n)+CURSOR;
        if(n<full.length){ setTimeout(step,24); return; }
        el.innerHTML=el.getAttribute('data-rich');      // restore dimmed comments
        i++;
        if(i<lines.length) setTimeout(nextLine,220);     // stop cleanly: no resting cursor
      })();
    })();
  }

  // --- start the terminal typewriter when a panel scrolls into view ---
  var cells=[].slice.call(document.querySelectorAll('main.strip .cell'));
  function onVisible(fig){
    if(fig.querySelector('.term-line')) setTimeout(function(){typeTerminal(fig);},340);
  }
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if(!en.isIntersecting) return;
        onVisible(en.target); io.unobserve(en.target);
      });
    },{threshold:0.25, rootMargin:'0px 0px -8% 0px'});
    cells.forEach(function(c){io.observe(c);});
  } else {
    cells.forEach(onVisible);
  }
})();
</script>
</body>
</html>
